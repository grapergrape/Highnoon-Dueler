<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High Noon Duelist</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <span id="hud-run">Bounty: $0</span>
      <span id="hud-class" class="hud-class"></span>
      <span id="hud-health"></span>
    </header>
    <div class="canvas-wrap">
      <canvas id="game-canvas" width="960" height="540"></canvas>
    </div>
    <div id="panel" class="panel"></div>
    <p class="hint">Click cards to play · Stamina limits plays · Lock In ends your prep for the round</p>
  </div>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
